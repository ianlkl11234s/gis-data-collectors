# Supabase realtime / spatial / reference 表清冊
#
# 用途：
#   tasks/daily_report.py 的 _section_supabase_realtime 用此清單呼叫 RPC
#   realtime.health_snapshot()（見 gis-platform/migrations/149_realtime_health_snapshot.sql）
#   一次撈所有表的寫入新鮮度，依 expected_interval_min 判定 STALE / OK / DEAD。
#
# 維護規則（重要）：
#   每次 cross_layer_map.yaml 改動後，務必同步本檔！見 .claude/CLAUDE.md
#
# 欄位：
#   schema                : 'realtime' | 'spatial' | 'reference' | 'public'
#   table                 : 表名
#   time_column           : 用什麼欄位算 max() 看新鮮度（預設 collected_at，部分表是 observed_at / occurred_at 等）
#   owner_collector       : cross_layer_map.yaml 裡的 collector key
#   expected_interval_min : 期望寫入頻率（分鐘）
#   critical              : 壞了會 page 你的
#   notes                 : 自由備註

tables:
  # ── 交通 ────────────────────────────────
  - {schema: realtime, table: youbike_snapshots,         time_column: collected_at, owner_collector: youbike, expected_interval_min: 15, critical: true}
  - {schema: realtime, table: youbike_current,           time_column: collected_at, owner_collector: youbike, expected_interval_min: 15, critical: true}
  - {schema: realtime, table: bus_positions,             time_column: collected_at, owner_collector: bus, expected_interval_min: 2, critical: true}
  - {schema: realtime, table: bus_current,               time_column: collected_at, owner_collector: bus, expected_interval_min: 2, critical: true}
  - {schema: realtime, table: bus_intercity_positions,   time_column: collected_at, owner_collector: bus_intercity, expected_interval_min: 2, critical: false}
  - {schema: realtime, table: bus_intercity_current,     time_column: collected_at, owner_collector: bus_intercity, expected_interval_min: 2, critical: false}
  - {schema: realtime, table: freeway_sections,          time_column: collected_at, owner_collector: freeway_vd, expected_interval_min: 10, critical: true}
  - {schema: realtime, table: freeway_sections_current,  time_column: collected_at, owner_collector: freeway_vd, expected_interval_min: 10, critical: true}
  - {schema: realtime, table: freeway_vd_traffic,        time_column: collected_at, owner_collector: freeway_vd, expected_interval_min: 10, critical: true}
  - {schema: realtime, table: train_positions,           time_column: collected_at, owner_collector: tra_train, expected_interval_min: 2, critical: true}
  - {schema: realtime, table: ship_positions,            time_column: collected_at, owner_collector: ship_ais, expected_interval_min: 10, critical: true}
  - {schema: realtime, table: ship_current,              time_column: collected_at, owner_collector: ship_ais, expected_interval_min: 10, critical: true}
  - {schema: reference, table: daily_schedules,          time_column: created_at,   owner_collector: rail_timetable, expected_interval_min: 1440, critical: false}

  # ── 航空 ────────────────────────────────
  - {schema: realtime, table: flight_positions,          time_column: collected_at, owner_collector: flight_fr24, expected_interval_min: 5, critical: false, notes: 多 collector 共用}
  - {schema: realtime, table: flight_trails,             time_column: collected_at, owner_collector: flight_fr24, expected_interval_min: 5, critical: false, notes: partitioned，parent 為空正常}

  # ── 氣象 / 地震 ─────────────────────────
  - {schema: realtime, table: weather_observations,      time_column: collected_at, owner_collector: weather, expected_interval_min: 60, critical: true}
  - {schema: realtime, table: weather_current,           time_column: observed_at,  owner_collector: weather, expected_interval_min: 60, critical: true}
  - {schema: realtime, table: temperature_grids,         time_column: collected_at, owner_collector: temperature, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: cwa_imagery_frames,        time_column: observed_at,  owner_collector: cwa_satellite, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: earthquake_events,         time_column: occurred_at,  owner_collector: earthquake, expected_interval_min: 1440, critical: true, notes: 事件驅動可能很久才一次}
  - {schema: realtime, table: disaster_alerts,           time_column: collected_at, owner_collector: ncdr_alerts, expected_interval_min: 15, critical: true}

  # ── 太空 ────────────────────────────────
  - {schema: realtime, table: satellite_positions,       time_column: collected_at, owner_collector: satellite, expected_interval_min: 120, critical: false}
  - {schema: realtime, table: satellite_current,         time_column: collected_at, owner_collector: satellite, expected_interval_min: 120, critical: false}
  - {schema: realtime, table: satellite_tle,             time_column: updated_at,   owner_collector: satellite, expected_interval_min: 1440, critical: false}
  - {schema: realtime, table: satellite_tle_history,     time_column: fetched_at,   owner_collector: satellite, expected_interval_min: 1440, critical: false}
  - {schema: realtime, table: launches,                  time_column: collected_at, owner_collector: launch, expected_interval_min: 15, critical: false}
  - {schema: realtime, table: launch_events,             time_column: collected_at, owner_collector: launch, expected_interval_min: 15, critical: false}
  - {schema: realtime, table: launch_pads,               time_column: collected_at, owner_collector: launch, expected_interval_min: 1440, critical: false}

  # ── 空氣品質 ────────────────────────────
  - {schema: realtime, table: air_quality_observations,  time_column: collected_at, owner_collector: air_quality, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: air_quality_current,       time_column: observed_at,  owner_collector: air_quality, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: aqi_imagery_frames,        time_column: observed_at,  owner_collector: air_quality_imagery, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: micro_sensor_readings,     time_column: collected_at, owner_collector: air_quality_microsensors, expected_interval_min: 5, critical: false}

  # ── 水利 ────────────────────────────────
  - {schema: realtime, table: reservoir_status,          time_column: snapshot_at,  owner_collector: water_reservoir, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: reservoir_daily_ops,       time_column: observed_at,  owner_collector: water_reservoir_daily_ops, expected_interval_min: 1440, critical: false}
  - {schema: realtime, table: river_water_level,         time_column: observed_at,  owner_collector: river_water_level, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: rain_gauge_readings,       time_column: observed_at,  owner_collector: rain_gauge_realtime, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: groundwater_level_readings, time_column: observed_at, owner_collector: groundwater_level, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: iot_wra_measurements,      time_column: observed_at,  owner_collector: iot_wra, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: uswg_measurements,         time_column: observed_at,  owner_collector: uswg, expected_interval_min: 10, critical: false}
  - {schema: public,   table: drought_alert_history,     time_column: published_date, owner_collector: wra_drought_alert, expected_interval_min: 1440, critical: false}
  - {schema: public,   table: drought_alert_current,     time_column: published_date, owner_collector: wra_drought_alert, expected_interval_min: 1440, critical: false}

  # ── 道路 / 廢棄物 / 急診 / 電力 ─────────
  - {schema: realtime, table: road_events,               time_column: collected_at, owner_collector: road_event_live, expected_interval_min: 5, critical: false}
  - {schema: realtime, table: road_events_current,       time_column: collected_at, owner_collector: road_event_live, expected_interval_min: 5, critical: false}
  - {schema: spatial,  table: waste_positions_realtime,  time_column: observed_at,  owner_collector: waste_positions, expected_interval_min: 2, critical: true}
  - {schema: realtime, table: er_hospital_status,        time_column: observed_at,  owner_collector: er_hospital_realtime, expected_interval_min: 15, critical: false}
  - {schema: realtime, table: er_hospital_current,       time_column: observed_at,  owner_collector: er_hospital_realtime, expected_interval_min: 15, critical: false}
  - {schema: realtime, table: power_system_status,       time_column: observed_at,  owner_collector: power_taipower, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: power_generation_unit,     time_column: observed_at,  owner_collector: power_taipower, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: power_region_demand,       time_column: observed_at,  owner_collector: power_taipower, expected_interval_min: 10, critical: false}

  # ── 新聞 ────────────────────────────────
  - {schema: realtime, table: news_events,               time_column: created_at,   owner_collector: news_events, expected_interval_min: 20, critical: false}

  # ── 公衛 ────────────────────────────────
  # cdc_public_health_weekly 跑在 HiCloud VM 上，每週四 11:00 一次
  - {schema: realtime, table: public_health_weekly,      time_column: collected_at, owner_collector: cdc_public_health_weekly, expected_interval_min: 10080, critical: false, notes: 週四 11:00 跑一次}

  # ── 其他 reference ──────────────────────
  - {schema: reference, table: foursquare_poi,           time_column: collected_at, owner_collector: foursquare_poi, expected_interval_min: 43200, critical: false}
