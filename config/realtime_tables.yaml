  - {schema: realtime, table: nuclear_radiation_stations, time_column: updated_at,   owner_collector: nuclear_radiation, expected_interval_min: 15, critical: false, notes: current 表 updated_at 每輪 touch＝collector 心跳（來源 stale 由 is_stale 欄位表達）}
  - {schema: realtime, table: taipei_sewer_measurements,  time_column: observed_at,  owner_collector: wic_sewer, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: taipei_evacuate_status,     time_column: observed_at,  owner_collector: wic_evacuate, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: taipei_pumb_status,         time_column: observed_at,  owner_collector: wic_pumb, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: pla_activity_daily,         time_column: collected_at, owner_collector: pla_activity_daily, expected_interval_min: 1440, critical: false, notes: 每日通報 1 row/day}
  - {schema: realtime, table: yt_live_current,            time_column: updated_at,   owner_collector: yt_live_video_resolver, expected_interval_min: 5, critical: false}
  - {schema: realtime, table: precipitation_raster_frames, time_column: collected_at, owner_collector: precipitation_raster, expected_interval_min: 120, critical: false, notes: 上游柵格發布常延遲 1-2h，interval 放寬 120}
  - {schema: realtime, table: earthquakes_global,         time_column: collected_at, owner_collector: global_climate_usgs_earthquake, expected_interval_min: 60, critical: false}
  - {schema: realtime, table: typhoon_positions,          time_column: collected_at, owner_collector: global_climate_jma_typhoon, expected_interval_min: 1440, critical: false, notes: 多 collector 共用（jma/jtwc）；事件驅動，颱風季外 DEAD 屬預期}
  - {schema: realtime, table: global_climate_grids,       time_column: collected_at, owner_collector: global_climate_cmems, expected_interval_min: 1440, critical: false, notes: 多 collector 共用（cmems/cams/noaa_gfs），日級模型}
  - {schema: realtime, table: border_airport_snapshot,    time_column: collected_at, owner_collector: immigration_apis_airport, expected_interval_min: 60, critical: false, notes: 跑在 HiCloud VM}
  - {schema: realtime, table: lightning_events,           time_column: collected_at, owner_collector: lightning_events, expected_interval_min: 1440, critical: false, notes: 事件驅動（無落雷即無資料），比照 earthquake_events 放寬}
  - {schema: realtime, table: market_index_current,       time_column: updated_at,   owner_collector: twse_market_index, expected_interval_min: 1440, critical: false, notes: 僅開盤時段有資料，1440x3＝3 天蓋過週末；連假誤報屬預期}
  - {schema: realtime, table: prison_population_daily,    time_column: collected_at, owner_collector: correctional_daily_snapshot, expected_interval_min: 1440, critical: false, notes: 每日 1 row（2026-07-03 啟用）}
  - {schema: realtime, table: traffic_accidents_a1,       time_column: collected_at, owner_collector: npa_traffic_accident_a1, expected_interval_min: 720, critical: false, notes: dedup by hash，僅新事故推進 MAX；久無新事故告警屬預期（2026-07-03 啟用）}

  # ── 文化場館 ────────────────────────────
  - {schema: realtime, table: tpml_seat_status,            time_column: observed_at,  owner_collector: tpml_seat, expected_interval_min: 10, critical: false, notes: 北市圖座位；閉館時段仍寫入（is_closed=true）}
