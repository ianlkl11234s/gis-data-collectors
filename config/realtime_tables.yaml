  - {schema: realtime, table: road_events_current,       time_column: collected_at, owner_collector: road_event_live, expected_interval_min: 5, critical: false}
  - {schema: spatial,  table: waste_positions_realtime,  time_column: observed_at,  owner_collector: waste_positions, expected_interval_min: 2, critical: true}
  - {schema: realtime, table: er_hospital_status,        time_column: observed_at,  owner_collector: er_hospital_realtime, expected_interval_min: 15, critical: false}
  - {schema: realtime, table: er_hospital_current,       time_column: observed_at,  owner_collector: er_hospital_realtime, expected_interval_min: 15, critical: false}
  - {schema: realtime, table: power_system_status,       time_column: observed_at,  owner_collector: power_taipower, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: power_generation_unit,     time_column: observed_at,  owner_collector: power_taipower, expected_interval_min: 10, critical: false}
  - {schema: realtime, table: power_region_demand,       time_column: observed_at,  owner_collector: power_taipower, expected_interval_min: 10, critical: false}

  # ── 新聞 ────────────────────────────────
  - {schema: realtime, table: news_events,               time_column: created_at,   owner_collector: news_events, expected_interval_min: 20, critical: false}

  # ── 公衛 ────────────────────────────────
  # cdc_public_health_weekly 跑在 HiCloud VM 上，每週四 11:00 一次
  - {schema: realtime, table: public_health_weekly,      time_column: collected_at, owner_collector: cdc_public_health_weekly, expected_interval_min: 10080, critical: false, notes: 週四 11:00 跑一次}

  # ── 其他 reference ──────────────────────
  - {schema: reference, table: foursquare_poi,           time_column: imported_at,  owner_collector: foursquare_poi, expected_interval_min: 43200, critical: false, notes: disabled reference dataset；不參與即時 freshness 事故判定}

  # ── 2026-07-02 production 實測補齊（AR-05，與 cross_layer_map.yaml 自動補回區同步）──
