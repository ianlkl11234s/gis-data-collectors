# Cross-Layer Map — collector ↔ Supabase tables ↔ S3 prefixes 的單一真相
#
# 用途：
#   - tasks/daily_report.py 跨層一致性（collector × SB × S3 三向交叉）
#   - 任何「全集合掃描」工具都該以此為準
#
# 維護規則（重要）：
#   每次新增 / 改動 collector 後，務必同步本檔！見 .claude/CLAUDE.md
#   遺漏會造成 daily_report 漏報該 collector 的健康狀態。
#
# 欄位定義：
#   enabled               : 該 collector 是否「應該在跑」（不論部署在哪）
#   deployment            : zeabur | hicloud_vm | disabled
#   expected_interval_min : 期望抓取間隔（分鐘，給 staleness 判斷用）
#   supabase_tables       : 該 collector 寫的所有 Supabase 表（含 history / current / 多表）
#   s3_prefixes           : 該 collector 在 S3 上的歸檔路徑（用於檢查 daily tar.gz 是否健康）
#   critical              : 壞了會 page 你的，True / False
#   notes                 : 自由備註

