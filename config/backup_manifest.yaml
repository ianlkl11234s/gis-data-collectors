# Automatic classification by schema
classification:
  static_schemas:
    - reference        # POI, airports, counties, national KPIs
    - spatial          # boundaries, demographics, fire, waste, environment
    - admin            # villages geometry
    - rail             # stations, ridership, lines
    - maritime         # ports, fishery, lighthouses
    - demographics     # population, vital stats
    - fire             # incidents, casualties, stations
    - energy           # power facilities, coal/LNG/fossil
    - public           # OSM power/water/flood/EV
    - safety           # hospitals, shelters
    - medical          # AED, long-term care
    - analytics        # daily/monthly summaries

  realtime_schemas:
    - live

  exclude_schemas:
    - metadata
    - opendata
    - pg_temp
    - pg_toast

# Summary Statistics
statistics:
  static_tables: 155
  realtime_tables: 83
  metadata_tables: 5
  archive_py_covered: 16
  realtime_backup_targets: 67
  description:
    - "Total static schemas: 12 (reference, spatial, admin, rail, maritime, demographics, fire, energy, public, safety, medical, analytics)"
    - "Total realtime schema: 1 (live)"
    - "Realtime targets for daily S3 backup: 83 - 16 (archive_py_covered) = 67 tables"
    - "Critical static tables: foursquare_poi, statistical_areas, village_demographics_yearly, power_facilities/units, villages"

strategy:
  archive_py_covered:
    description: "16 collectors write JSON locally; archive.py tars daily to S3"
    path: "s3://{bucket}/{collector_name}/archives/{YYYY-MM-DD}.tar.gz"
    lifecycle: "STANDARD then GLACIER_IR after 90 days"
    recovery: "Re-ingest JSON via data-collectors/restore_from_s3.py"

  static_tables:
    description: "155 tables across 12 static schemas"
    cadence: "Daily fingerprint check; only changed tables dumped"
    format: "CSV/Parquet, compressed, partitioned by date"
    lifecycle: "STANDARD then GLACIER_IR 180d then DEEP_ARCHIVE 1y"
    path: "s3://{bucket}/static/{schema}/{table}/YYYY-MM-DD/"

  realtime_non_covered:
    description: "67 realtime tables without JSON archive"
    cadence: "Daily partition dump to S3"
    format: "Parquet, compressed"
    retention: "30 days STANDARD then GLACIER_IR"
    path: "s3://{bucket}/realtime/{schema}/{table}/YYYY-MM-DD/"
    critical: "Only backup option; CRITICAL for recovery if Supabase lost"

  metadata_tables:
    description: "5 metadata tables (excluded from backup)"
    reason: "Ephemeral; all reconstructible or low-value"

reconcile_robot:
  name: "backup_manifest_reconcile.py"
  frequency: "daily"
  steps:
    - "Query information_schema.tables for all schemas in Supabase"
    - "Classify: static_schemas > static; realtime_schemas > realtime; exclude_schemas > skip"
    - "Match against overrides for per-table config"
    - "Report totals and detect mismatches"
  expected_output:
    static_discovered: 155
    realtime_discovered: 83
    excluded: 16
    archive_py_covered: 16
    realtime_backup_targets: 67

metadata:
  document_version: "1.0"
  generated: "2026-06-21"
  data_catalog_source: "docs/api-catalog/{realtime,reference,spatial,metadata}.md"
  audit_reference: "docs/s3-backup-audit.md"
  maintenance: "Update when new migrations add tables or classifications change"
